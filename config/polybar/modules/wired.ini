[module/network]
type = internal/network
interface-type = wired
ping-interval = 5
format-connected = <label-connected>
format-packetloss = <label-packetloss>

label-connected = 
label-disconnected = 󰈀
label-disconnected-foreground = ${colors.foreground_off}
label-packetloss = 󰈀
label-packetloss-foreground = ${colors.foreground_critical}
