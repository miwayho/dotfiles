include-file = ~/.config/polybar/modules/volume.ini
include-file = ~/.config/polybar/modules/date.ini
include-file = ~/.config/polybar/modules/network.ini
include-file = ~/.config/polybar/modules/window.ini

[colors]
background = #1C1B1A
foreground = #FFFCF0
foreground_off = #282726
foreground_critical = #AF3029

[bar/main]
width = 100%
height = 4%

bottom =  true
padding-left = 2
padding-right = 2
background = ${colors.background}

font-0 = "Fira Code:style=Regular:size=13;2"
font-1 = "Fira Code Nerd Font:style=Regular:size=13;1"

module-margin-right = 2
modules-right = network volume battery date
modules-center = window